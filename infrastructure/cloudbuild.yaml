# GCP Cloud Build — nutrisnap
# Triggers: push to main → deploy both services

substitutions:
  _REGION: asia-southeast1
  _BACKEND_URL: https://nutrisnap-api-1012672992257.asia-southeast1.run.app
  _SHA: latest

steps:
  # ── Build backend ──────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - build
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:$_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:latest'
      - '-f'
      - 'infrastructure/Dockerfile.backend'
      - '--cache-from'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - push
      - '-a'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend'

  # ── Build frontend ─────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - build
      - '--no-cache'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend:$_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend:latest'
      - '-f'
      - 'infrastructure/Dockerfile.frontend'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=$_BACKEND_URL'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - push
      - '-a'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend'

  # ── Deploy backend ─────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - nutrisnap-api
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:$_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=nutrisnap-backend-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=10'
      - '--timeout=60s'
      # Note: Do NOT set GCP_PROJECT here — forces Vertex AI path which lacks seed support.
      # Let the app detect GEMINI_API_KEY and use the direct Gemini API path instead.
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'

  # ── Deploy frontend ────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - nutrisnap
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend:$_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=nutrisnap-backend-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:$_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:latest'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend:$_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
