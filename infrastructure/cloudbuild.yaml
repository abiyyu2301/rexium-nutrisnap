# GCP Cloud Build — nutrisnap
# Triggers: push to main → deploy both services

substitutions:
  _REGION: asia-southeast1
  _SERVICE_ACCOUNT: nutrisnap-backend-sa

steps:
  # ── Build backend ──────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - build
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:latest'
      - '--cache-from'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:latest'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - push
      - '-a'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend'

  # ── Build frontend ─────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - build
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend:latest'
      - './frontend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - push
      - '-a'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend'

  # ── Deploy backend ─────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - nutrisnap-api
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=nutrisnap-backend-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=10'
      - '--timeout=60s'
      - '--set-env-vars=GCP_PROJECT=$PROJECT_ID,GCP_LOCATION=$_REGION'

  # ── Deploy frontend ────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - nutrisnap
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=nutrisnap-backend-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:$COMMIT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/backend:latest'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend:$COMMIT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/nutrisnap-images/frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
